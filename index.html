<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Stream | Modern</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --card-glass: rgba(255, 255, 255, 0.05);
            --accent: #ff4757;
            --text-light: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-light); }

        /* Modern Navbar */
        .nav-bar { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--card-glass); }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        /* Search Section */
        .search-area { padding: 20px; }
        .search-input { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--card-glass); color: #fff; outline: none; }

        /* Main Grid */
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 15px; 
            padding: 20px; 
        }

        /* Premium Glass Card */
        .video-item { 
            background: var(--card-glass); 
            backdrop-filter: blur(10px); 
            border-radius: 16px; 
            overflow: hidden; 
            transition: transform 0.3s;
            cursor: pointer;
        }
        .video-item:hover { transform: translateY(-5px); border: 1px solid var(--accent); }
        .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .details { padding: 12px; }
        .title { font-size: 13px; margin-bottom: 5px; height: 35px; overflow: hidden; }

        /* Video Player Panel */
        #theater { 
            display: none; padding: 20px; position: sticky; top: 0; z-index: 100; 
            background: var(--bg-dark); 
        }
        .player { width: 100%; aspect-ratio: 16/9; border-radius: 20px; overflow: hidden; background: #000; }
        
        .btn-vip { background: var(--accent); padding: 10px 20px; border-radius: 20px; color: #fff; text-decoration: none; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="logo">BURMESE<span>RELAX</span></div>
    </div>

    <div id="theater">
        <div class="player"><iframe id="frame" src="" width="100%" height="100%" allowfullscreen></iframe></div>
        <h2 style="margin-top:15px;" id="vTitle"></h2>
        <a href="https://t.me/Dr_chatgyi1" class="btn-vip">🔥 VIP ACCESS</a>
    </div>

    <div class="search-area">
        <input type="text" class="search-input" placeholder="Search premium videos..." onkeypress="handleSearch(event)">
    </div>

    <div class="video-grid" id="container"></div>

    <script>
        let page = 1;
        let query = 'myanmar';
        
        async function fetchVideos(p) {
            const res = await fetch(`https://www.eporner.com/api/v2/video/search/?query=${query}&per_page=20&page=${p}`);
            const data = await res.json();
            const grid = document.getElementById('container');
            
            data.videos.forEach(v => {
                const div = document.createElement('div');
                div.className = 'video-item';
                div.onclick = () => play(v.embed, v.title);
                div.innerHTML = `
                    <img src="${v.default_thumb.src}" class="thumb">
                    <div class="details">
                        <div class="title">${v.title}</div>
                        <small style="opacity:0.6">${v.views} views</small>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function play(url, title) {
            document.getElementById('theater').style.display = 'block';
            document.getElementById('frame').src = url;
            document.getElementById('vTitle').innerText = title;
            window.scrollTo(0, 0);
        }

        function handleSearch(e) {
            if(e.key === 'Enter') {
                query = e.target.value;
                page = 1;
                document.getElementById('container').innerHTML = '';
                fetchVideos(page);
            }
        }

        window.onscroll = () => {
            if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
                page++; fetchVideos(page);
            }
        };

        fetchVideos(page);
    </script>
</body>
</html>
