<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18+ Unlimited Tube</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0c0c0e;
            color: #fff;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #ff5500;
        }

        /* ----- ၁။ Home Page Layout ----- */
        #homePage {
            display: block;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .video-card {
            background-color: #16161a;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .video-card:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(255, 85, 0, 0.4);
        }
        .thumbnail-box {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #000;
        }
        .thumbnail-box img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }
        .duration {
            position: absolute;
            bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.8);
            padding: 2px 5px;
            font-size: 12px;
            border-radius: 3px;
        }
        .video-info { padding: 12px; }
        .video-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
            height: 40px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            margin-bottom: 8px;
        }
        .video-stats {
            font-size: 12px;
            color: #aaaaaa;
            display: flex;
            justify-content: space-between;
        }

        /* ----- ၂။ Player Page Layout ----- */
        #playerPage {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            background: #111;
            padding: 15px;
            border-radius: 8px;
        }
        .video-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            margin-top: 15px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .back-btn:hover {
            background-color: #ff5500;
        }

        /* Loading စာတန်းများ */
        .loading-status {
            text-align: center;
            font-size: 18px;
            color: #ffcc00;
            margin: 30px 0;
        }
    </style>
</head>
<body>

    <h1>18+ Eporner Unlimited</h1>

    <div id="homePage">
        <div class="video-grid" id="videoGrid"></div>
        <div id="scrollLoading" class="loading-status">ဗီဒီယိုများကို ရှာဖွေနေပါတယ်...</div>
    </div>

    <div id="playerPage">
        <button class="back-btn" onclick="backToHome()">← Back to Home</button>
        <div class="video-box" id="playerWrapper"></div>
    </div>

<script>
    let currentPage = 1; // စတင်မည့် Page နံပါတ်
    let isLoading = false; // ဒေတာ နှစ်ခါထပ်မဆွဲအောင် ထိန်းပေးမည့် Variable
    const searchQuery = 'sexy'; // ရှာဖွေမည့် Keyword

    window.onload = function() {
        loadEpornerVideos(currentPage);
    };

    // အောက်ကို ဆွဲချလိုက်လို့ အောက်ခြေနားရောက်ရင် နောက်ထပ် ဗီဒီယိုတွေ Auto ခေါ်မည့်စနစ် (Infinite Scroll စစ်ဆေးခြင်း)
    window.onscroll = function() {
        // Player Page ပွင့်နေရင် အောက်ဆွဲလည်း ဒေတာထပ်မခေါ်အောင် တားထားပါတယ်
        if (document.getElementById('homePage').style.display === 'none') return;

        // ဖုန်း သို့မဟုတ် ကွန်ပျူတာ Screen အောက်ခြေ ရောက်၊ မရောက် တွက်ချက်ခြင်း
        if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 300) {
            if (!isLoading) {
                currentPage++; // Page နံပါတ်ကို ၁ တိုးမယ် (ဥပမာ- Page 2, Page 3...)
                loadEpornerVideos(currentPage);
            }
        }
    };

    function loadEpornerVideos(page) {
        isLoading = true;
        document.getElementById('scrollLoading').innerText = "ဗီဒီယိုအသစ်များကို အောက်ကနေ ထပ်မံဖြည့်တင်းနေပါတယ်...";
        document.getElementById('scrollLoading').style.display = 'block';

        const url = `https://www.eporner.com/api/v2/video/search/?query=${searchQuery}&per_page=20&thumbsize=big&page=${page}`;

        fetch(url)
        .then(res => res.json())
        .then(data => {
            const grid = document.getElementById('videoGrid');
            const videos = data.videos;

            if (Array.isArray(videos) && videos.length > 0) {
                videos.forEach(video => {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.onclick = () => showVideoPlayer(video.embed);

                    const formattedViews = Number(video.views).toLocaleString();

                    card.innerHTML = `
                        <div class="thumbnail-box">
                            <img src="${video.default_thumb.src}" alt="Thumb">
                            <span class="duration">${video.length_min} mins</span>
                        </div>
                        <div class="video-info">
                            <div class="video-title">${video.title}</div>
                            <div class="video-stats">
                                <span>👁️ ${formattedViews} views</span>
                                <span style="color: #ff5500;">★ ${video.rate}</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card); // ရလာတဲ့ ဗီဒီယိုကတ်အသစ်တွေကို မူလစာရင်းရဲ့ အောက်ခြေမှာ ဆက်တိုက် သွားကပ်ပေးခြင်း
                });
                
                document.getElementById('scrollLoading').style.display = 'none';
                isLoading = false; // ဒေတာဆွဲလို့ ပြီးသွားပြီဖြစ်ကြောင်း သတ်မှတ်
            } else {
                document.getElementById('scrollLoading').innerText = "ဗီဒီယိုများ အကုန်လုံး ကုန်သွားပါပြီ။";
                isLoading = true; // ဗီဒီယို ထပ်မရှိတော့ရင် ဒေတာထပ်မခေါ်အောင် ပိတ်ပစ်လိုက်သည်
            }
        })
        .catch(err => {
            console.error(err);
            document.getElementById('scrollLoading').innerText = "ကွန်ရက်ကြောင့် ဒေတာဆွဲမရဖြစ်နေပါတယ်။";
            isLoading = false;
        });
    }

    function showVideoPlayer(embedHtml) {
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('playerPage').style.display = 'block';
        document.getElementById('playerWrapper').innerHTML = embedHtml;
        window.scrollTo(0, 0); // Player Page ရောက်ရင် Screen အပေါ်ဆုံးကို ပြန်တင်ပေးခြင်း
    }

    function backToHome() {
        document.getElementById('playerPage').style.display = 'none';
        document.getElementById('playerWrapper').innerHTML = "";
        document.getElementById('homePage').style.display = 'block';
    }
</script>
</body>
</html>
