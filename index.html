<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Stream | Pastel Edition</title>
    
    <script src="https://pl30200751.effectivecpmnetwork.com/7c/62/e5/7c62e523a048df558686896a53a4c525.js"></script>
    <script src="https://pl30200752.effectivecpmnetwork.com/e0/11/0e/e0110eb1ee8550c29e1b5ba2aa848d8f.js"></script>

    <style>
        :root {
            --bg-dark: #0B0F19; /* Deep Navy Dark Background */
            --accent-blue: #A2D2FF; /* အစ်ကိုရွေးချယ်ထားသော Soft Pastel Blue */
            --card-glass: rgba(162, 210, 255, 0.07); /* Pastel Blue Glass Effect */
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        /
        .nav-bar { 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(162, 210, 255, 0.1); 
            background: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: #ffffff; }
        .logo span { color: var(--accent-blue); text-shadow: 0 0 10px rgba(162, 210, 255, 0.3); }
        
        .site-logo-img {
            width: 35px;
            height: 35px;
            object-fit: cover;
            border-radius: 50%;
            border: 1.5px solid var(--accent-blue);
            box-shadow: 0 0 8px rgba(162, 210, 255, 0.4);
        }

        /* Search Section */
        .search-area { padding: 20px; }
        .search-input { 
            width: 100%; 
            padding: 15px; 
            border-radius: 14px; 
            border: 1px solid rgba(162, 210, 255, 0.15); 
            background: var(--card-glass); 
            color: #fff; 
            outline: none;
            font-size: 14px;
            transition: all 0.3s;
        }
        .search-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 12px rgba(162, 210, 255, 0.2);
        }

        /* Main Grid */
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 18px; 
            padding: 20px; 
        }

        /* Premium Glass Card */
        .video-item { 
            background: var(--card-glass); 
            backdrop-filter: blur(8px); 
            border-radius: 16px; 
            overflow: hidden; 
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(162, 210, 255, 0.03);
        }
        .video-item:hover { 
            transform: translateY(-5px); 
            border-color: var(--accent-blue);
            box-shadow: 0 5px 15px rgba(162, 210, 255, 0.1);
        }
        .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .details { padding: 14px; }
        .title { font-size: 13px; color: var(--text-main); margin-bottom: 6px; height: 35px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; font-weight: 500; }
        .views-count { color: var(--text-muted); font-size: 11px; }

        /
        #theater { 
            display: none; 
            position: fixed;
            top: 66px; 
            left: 0;
            width: 100vw;
            height: calc(100vh - 66px);
            background: var(--bg-dark); 
            padding: 20px; 
            overflow-y: auto;
            z-index: 2000;
        }
        
        /*  Video Frame Style (ဘေ) */
        .player { 
            width: 100%; 
            aspect-ratio: 16/9; 
            border-radius: 20px; 
            overflow: hidden; 
            background: #000; 
            position: relative; 
            border: 2px solid var(--accent-blue); /* ပရီမီယမ်ဘောင်လိုင်း */
            box-shadow: 0 0 20px rgba(162, 210, 255, 0.25); /* Glow အလင်းတန်း Effect */
        }
        
        /*  Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            background: rgba(162, 210, 255, 0.1);
            color: var(--accent-blue);
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 16px;
            cursor: pointer;
            border: 1px solid rgba(162, 210, 255, 0.2);
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(162, 210, 255, 0.2); }

        /* VIP Text & Promo Box */
        .vip-promo-box {
            background: var(--card-glass);
            padding: 20px;
            border-radius: 16px;
            margin-top: 20px;
            text-align: center;
            border: 1px solid rgba(162, 210, 255, 0.1);
        }
        .vip-promo-box p {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-main);
            margin-bottom: 15px;
            font-weight: 500;
        }
        .vip-highlight { color: var(--accent-blue); font-weight: 800; text-shadow: 0 0 5px rgba(162, 210, 255, 0.5); }

        /*  Runner Color Wave Animation Button Style */
        .runner-vip-btn {
            display: inline-block;
            width: 90%;
            max-width: 280px;
            padding: 14px;
            font-size: 14px;
            color: #0B0F19; /* စာသားကို Dark Theme ဖြစ်အောင်လုပ်ပြီး ပေါ်လွင်စေပါတယ် */
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            background: linear-gradient(90deg, #A2D2FF, #ffffff, #B3E5FC, #A2D2FF);
            background-size: 300% 100%;
            animation: runnerAnimation 2.5s linear infinite;
            box-shadow: 0 4px 15px rgba(162, 210, 255, 0.4);
            transition: transform 0.1s ease;
        }
        .runner-vip-btn:active { transform: scale(0.96); }

        @keyframes runnerAnimation {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 0%; }
        }

        .loader { display: block; text-align: center; padding: 20px; color: var(--accent-blue); font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="logo-wrapper" onclick="refreshToRandom()">
            <div class="logo">BURMESE<span>RELAX</span></div>
            <img class="site-logo-img" src="https://i.ibb.co/prdxhDS4/d6719cb17570cf605695f50cc1c25c86.jpg" alt="Logo">
        </div>
    </div>

    <div id="theater">
        <div class="back-btn" onclick="closePlayer()">← နောက်သို့ ပြန်သွားရန်</div>
        
        <div class="player">
            <iframe id="frame" src="" width="100%" height="100%" allowfullscreen></iframe>
        </div>
        <h2 style="margin-top:16px; font-size: 16px; line-height: 1.4;" id="vTitle"></h2>
        
        <div class="vip-promo-box">
            <p>
                မြန်မာကားများ // Local Leak // အထန်မမများ // ကလေးအောကား များကို <br>
                တစ်သတ်တာ မန်ဘာကြေး <span class="vip-highlight">၂၀၀၀၀ ကျပ်</span> ဖြင့် လာဝင်နိုင်ပါပြီ။
            </p>
            <a id="vipBtn" class="runner-vip-btn" href="" target="_blank">
                🔥 VIP ဝင်ရန်
            </a>
        </div>
    </div>

    <div id="mainContent">
        <div class="search-area">
            <input type="text" class="search-input" id="searchInput" placeholder="Search premium videos..." onkeypress="handleSearch(event)">
        </div>

        <div class="video-grid" id="container"></div>
        <div id="loadingStatus" class="loader" style="display:none;">Loading more videos...</div>
    </div>

    <script>
        const keywordsPool = ['myanmar', 'japan', 'asian', 'romance', 'college', 'sexy', 'leaked', 'amateur', 'solo'];
        let query = '';
        let page = 1;
        let isLoading = false;

        const tgBaseUrl = "https://t.me/Dr_chatgyi1?text=" + encodeURIComponent("Vip ဝင်ချင်လို့ပါ Ngwe lwal ya mae nambar lay po pay par");

        window.onload = function() {
            document.getElementById("vipBtn").setAttribute("href", tgBaseUrl);
            setRandomFeed();
        };

        function setRandomFeed() {
            query = keywordsPool[Math.floor(Math.random() * keywordsPool.length)];
            page = Math.floor(Math.random() * 8) + 1; 
            document.getElementById('container').innerHTML = '';
            fetchVideos(page);
        }
        
        async function fetchVideos(p) {
            if (isLoading) return;
            isLoading = true;
            document.getElementById('loadingStatus').style.display = 'block';

            try {
                const res = await fetch(`https://www.eporner.com/api/v2/video/search/?query=${encodeURIComponent(query)}&per_page=20&page=${p}&thumbsize=big`);
                const data = await res.json();
                const grid = document.getElementById('container');
                
                if (data && data.videos && data.videos.length > 0) {
                    data.videos.forEach(v => {
                        const div = document.createElement('div');
                        div.className = 'video-item';
                        div.onclick = () => play(v.embed, v.title);
                        div.innerHTML = `
                            <img src="${v.default_thumb.src}" class="thumb" loading="lazy">
                            <div class="details">
                                <div class="title">${v.title}</div>
                                <div class="views-count">👁️ ${parseInt(v.views).toLocaleString()} views</div>
                            </div>
                        `;
                        grid.appendChild(div);
                    });
                }
            } catch (error) {
                console.error("Error:", error);
            } finally {
                document.getElementById('loadingStatus').style.display = 'none';
                isLoading = false;
            }
        }

        function play(url, title) {
            document.getElementById('theater').style.display = 'block';
            document.getElementById('frame').src = url;
            document.getElementById('vTitle').innerText = title;
            document.getElementById('theater').scrollTop = 0;
            document.body.style.overflow = 'hidden'; 
        }

        function closePlayer() {
            document.getElementById('theater').style.display = 'none';
            document.getElementById('frame').src = '';
            document.body.style.overflow = 'auto'; 
        }

        function handleSearch(e) {
            if(e.key === 'Enter') {
                query = e.target.value;
                page = 1;
                closePlayer();
                document.getElementById('container').innerHTML = '';
                fetchVideos(page);
            }
        }

        function refreshToRandom() {
            closePlayer();
            document.getElementById('searchInput').value = '';
            setRandomFeed();
        }

        window.onscroll = () => {
            if (document.getElementById('theater').style.display !== 'block') {
                if(window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 600) {
                    if(!isLoading) { page++; fetchVideos(page); }
                }
            }
        };
    </script>
</body>
</html>
