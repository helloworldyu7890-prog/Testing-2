<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Stream | Modern Dynamic</title>
    
    <script src="https://pl30200751.effectivecpmnetwork.com/7c/62/e5/7c62e523a048df558686896a53a4c525.js"></script>
    <script src="https://pl30200752.effectivecpmnetwork.com/e0/11/0e/e0110eb1ee8550c29e1b5ba2aa848d8f.js"></script>

    <style>
        :root {
            --bg-dark: #0a0a0c;
            --card-glass: rgba(255, 255, 255, 0.05);
            --accent: #ff4757;
            --text-light: #ffffff;
            --sexy-blue: #007BFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-light); }

        /* 👑 Modern Navbar */
        .nav-bar { 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--card-glass); 
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        
        .site-logo-img {
            width: 35px;
            height: 35px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Search Section */
        .search-area { padding: 20px; }
        .search-input { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--card-glass); color: #fff; outline: none; }

        /* Main Grid */
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 15px; 
            padding: 20px; 
        }

        /* Premium Glass Card */
        .video-item { 
            background: var(--card-glass); 
            backdrop-filter: blur(10px); 
            border-radius: 16px; 
            overflow: hidden; 
            transition: transform 0.3s;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }
        .video-item:hover { transform: translateY(-5px); border: 1px solid var(--accent); }
        .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .details { padding: 12px; }
        .title { font-size: 13px; margin-bottom: 5px; height: 35px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* 🔒 Fixed Video Player Panel (အောက်ဆွဲချရင် ငြိမ်နေအောင် လုပ်ထားသည့်အပိုင်း) */
        #theater { 
            display: none; 
            padding: 20px; 
            background: var(--bg-dark); 
            border-bottom: 1px solid var(--card-glass);
            position: fixed; /* Fixed ပြောင်းလိုက်လို့ အပေါ်မှာပဲ ငြိမ်နေပါမယ် */
            top: 66px; /* Navbar ရဲ့အောက်ကနေ ကပ်ပြီး ပေါ်ပါမယ် */
            left: 0;
            width: 100%;
            max-height: calc(100vh - 66px);
            overflow-y: auto; /* ဗီဒီယို Panel ထဲက စာသားတွေရှည်ရင် ၎င်းထဲမှာတင် Scroll ဆွဲနိုင်ပါတယ် */
            z-index: 999;
        }
        .player { width: 100%; aspect-ratio: 16/9; border-radius: 20px; overflow: hidden; background: #000; position: relative; }
        
        /* 🔙 Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 12px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: background 0.2s;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.2); }

        /* 👑 VIP Text & Promo Box */
        .vip-promo-box {
            background: var(--card-glass);
            padding: 16px;
            border-radius: 16px;
            margin-top: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .vip-promo-box p {
            font-size: 13px;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .vip-highlight { color: #ff1262; font-weight: 800; }

        /* 🏃‍♂️ Runner Color Wave Animation Button Style */
        .runner-vip-btn {
            display: inline-block;
            width: 90%;
            max-width: 280px;
            padding: 12px;
            font-size: 14px;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            background: linear-gradient(90deg, #007BFF, #ff3366, #00ffcc, #0077FF);
            background-size: 300% 100%;
            animation: runnerAnimation 2s linear infinite;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
            transition: transform 0.1s ease;
        }
        .runner-vip-btn:active { transform: scale(0.96); }

        @keyframes runnerAnimation {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 0%; }
        }

        .loader { display: block; text-align: center; padding: 20px; color: var(--accent); font-weight: bold; }
        
        /* Player ပွင့်နေချိန် အောက်က ဗီဒီယိုတွေကို အပေါ်ကနေ နေရာချန်ပေးဖို့ သုံးပါတယ် */
        .theater-open-padding {
            padding-top: 0px;
            transition: padding 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="logo-wrapper" onclick="refreshToRandom()">
            <div class="logo">BURMESE<span>RELAX</span></div>
            <img class="site-logo-img" src="https://i.ibb.co/prdxhDS4/d6719cb17570cf605695f50cc1c25c86.jpg" alt="Logo">
        </div>
    </div>

    <div id="theater">
        <div class="back-btn" onclick="closePlayer()">← နောက်သို့ ပြန်သွားရန်</div>
        <div class="player">
            <iframe id="frame" src="" width="100%" height="100%" allowfullscreen></iframe>
        </div>
        <h2 style="margin-top:12px; font-size: 15px;" id="vTitle"></h2>
        
        <div class="vip-promo-box">
            <p>
                မြန်မာကားများ // Local Leak // အထန်မမများ // ကလေးအောကား များကို <br>
                တစ်သတ်တာ မန်ဘာကြေး <span class="vip-highlight">၂၀၀၀၀ ကျပ်</span> ဖြင့် လာဝင်နိုင်ပါပြီ။
            </p>
            <a id="vipBtn" class="runner-vip-btn" href="" target="_blank">
                🔥 VIP ဝင်ရန်
            </a>
        </div>
    </div>

    <div id="mainContent" class="theater-open-padding">
        <div class="search-area">
            <input type="text" class="search-input" id="searchInput" placeholder="Search premium videos..." onkeypress="handleSearch(event)">
        </div>

        <div class="video-grid" id="container"></div>
        <div id="loadingStatus" class="loader" style="display:none;">Loading more videos...</div>
    </div>

    <script>
        const keywordsPool = ['myanmar', 'japan', 'asian', 'romance', 'college', 'sexy', 'leaked', 'amateur', 'solo'];
        let query = '';
        let page = 1;
        let isLoading = false;

        const tgBaseUrl = "https://t.me/Dr_chatgyi1?text=" + encodeURIComponent("Vip ဝင်ချင်လို့ပါ Ngwe lwal ya mae nambar lay po pay par");

        window.onload = function() {
            document.getElementById("vipBtn").setAttribute("href", tgBaseUrl);
            setRandomFeed();
        };

        function setRandomFeed() {
            query = keywordsPool[Math.floor(Math.random() * keywordsPool.length)];
            page = Math.floor(Math.random() * 8) + 1; 
            document.getElementById('container').innerHTML = '';
            fetchVideos(page);
        }
        
        async function fetchVideos(p) {
            if (isLoading) return;
            isLoading = true;
            document.getElementById('loadingStatus').style.display = 'block';

            try {
                const res = await fetch(`https://www.eporner.com/api/v2/video/search/?query=${encodeURIComponent(query)}&per_page=20&page=${p}&thumbsize=big`);
                const data = await res.json();
                const grid = document.getElementById('container');
                
                if (data && data.videos && data.videos.length > 0) {
                    data.videos.forEach(v => {
                        const div = document.createElement('div');
                        div.className = 'video-item';
                        div.onclick = () => play(v.embed, v.title);
                        div.innerHTML = `
                            <img src="${v.default_thumb.src}" class="thumb" loading="lazy">
                            <div class="details">
                                <div class="title">${v.title}</div>
                                <small style="opacity:0.6">👁️ ${parseInt(v.views).toLocaleString()} views</small>
                            </div>
                        `;
                        grid.appendChild(div);
                    });
                }
            } catch (error) {
                console.error("Error:", error);
            } finally {
                document.getElementById('loadingStatus').style.display = 'none';
                isLoading = false;
            }
        }

        // ဗီဒီယို ဖွင့်လိုက်ချိန်
        function play(url, title) {
            const theater = document.getElementById('theater');
            theater.style.display = 'block';
            document.getElementById('frame').src = url;
            document.getElementById('vTitle').innerText = title;
            
            // ဗီဒီယိုဖွင့်ရင် အပေါ်ဆုံးကို Scroll တစ်ချက်ဆွဲပေးပြီး အောက်က Content တွေကို ကွယ်မသွားအောင် နေရာဖယ်ပေးပါတယ်
            window.scrollTo({top: 0, behavior: 'smooth'});
            
            // မျက်နှာပြင် အရွယ်အစားအလိုက် အောက်က Grid ကို ပျောက်မသွားအောင် နေရာချန်ပေးတဲ့ စနစ်
            setTimeout(() => {
                let theaterHeight = theater.offsetHeight;
                document.getElementById('mainContent').style.paddingTop = theaterHeight + 'px';
            }, 100);
        }

        // ဗီဒီယို ပိတ်လိုက်ချိန်
        function closePlayer() {
            document.getElementById('theater').style.display = 'none';
            document.getElementById('frame').src = '';
            document.getElementById('mainContent').style.paddingTop = '0px'; // နေရာချန်ထားတာကို ပြန်ဖျက်ပါတယ်
        }

        function handleSearch(e) {
            if(e.key === 'Enter') {
                query = e.target.value;
                page = 1;
                closePlayer();
                document.getElementById('container').innerHTML = '';
                fetchVideos(page);
            }
        }

        function refreshToRandom() {
            closePlayer();
            document.getElementById('searchInput').value = '';
            setRandomFeed();
        }

        window.onscroll = () => {
            if(window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 600) {
                if(!isLoading) { page++; fetchVideos(page); }
            }
        };
    </script>
</body>
</html>
